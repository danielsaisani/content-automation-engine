name: Run Go Tests

on: pull_request

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install Dependencies
        run: cd incubator && go get .
      - name: Test
        run: cd incubator && go test ./...